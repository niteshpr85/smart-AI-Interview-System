<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-xl font-bold mb-4 text-center">Add Question</h2>

    <form method="POST">
        <input type="text" name="question" placeholder="Enter question" 
        class="w-full p-2 border rounded mb-3" required>

        <button class="w-full bg-blue-500 text-white p-2 rounded">Add</button>
    </form>

    <a href="/" class="block text-center mt-4 text-gray-600">⬅ Back</a>

</div>

</body>
</html>
